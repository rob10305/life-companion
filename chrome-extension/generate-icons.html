<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each canvas and "Save image as" to the icons/ folder</p>
<script>
[16, 48, 128].forEach(size => {
  const canvas = document.createElement('canvas')
  canvas.width = size
  canvas.height = size
  const ctx = canvas.getContext('2d')

  // Blue rounded rect background
  const r = size * 0.2
  ctx.beginPath()
  ctx.moveTo(r, 0)
  ctx.lineTo(size - r, 0)
  ctx.quadraticCurveTo(size, 0, size, r)
  ctx.lineTo(size, size - r)
  ctx.quadraticCurveTo(size, size, size - r, size)
  ctx.lineTo(r, size)
  ctx.quadraticCurveTo(0, size, 0, size - r)
  ctx.lineTo(0, r)
  ctx.quadraticCurveTo(0, 0, r, 0)
  ctx.fillStyle = '#2563eb'
  ctx.fill()

  // White compass/star icon
  ctx.fillStyle = 'white'
  ctx.font = `${size * 0.55}px serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('🧭', size/2, size/2 + size*0.03)

  const p = document.createElement('p')
  p.textContent = `icon${size}.png:`
  document.body.appendChild(p)
  document.body.appendChild(canvas)

  // Auto download
  const link = document.createElement('a')
  link.download = `icon${size}.png`
  link.href = canvas.toDataURL()
  link.textContent = ` Download icon${size}.png`
  p.appendChild(link)
})
</script>
</body>
</html>
